name: ${PROJECT_NAME}

services:
  # 1. Database
  db-server:
    image: mariadb:10.6
    container_name: ${MY_USERNAME}-db
    restart: always
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: app_user
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/db_root_pass
      MARIADB_PASSWORD_FILE: /run/secrets/db_user_pass
    networks:
      - backend-zone
    volumes:
      - db-storage:/var/lib/mysql
    secrets:
      - db_root_pass
      - db_user_pass

  # 2. Backend PHP
  backend-php:
    image: bitnami/php-fpm:latest
    container_name: ${MY_USERNAME}-php
    restart: always
    volumes:
     - ./src:/var/www/html
    networks:
      - backend-zone
    secrets:
      - db_user_pass

  # 3. Web Proxy (Nginx)
  web-proxy:
    image: nginx:latest
    container_name: ${MY_USERNAME}-web
    restart: always
    ports:
      - "${HTTP_PORT}:80"
    volumes:
      - ./src:/var/www/html
    configs:
      - source: my-nginx-conf
        target: /etc/nginx/conf.d/default.conf
    networks:
      - frontend-zone
      - backend-zone
    depends_on:
      - backend-php

  # 4. phpMyAdmin
  db-management:
    image: phpmyadmin:latest
    container_name: ${MY_USERNAME}-pma
    restart: always
    environment:
      PMA_HOST: db-server
      PMA_PASSWORD_FILE: /run/secrets/db_root_pass
    ports:
      - "${PMA_PORT}:80"
    networks:
      - backend-zone
    depends_on:
      - db-server
    secrets:
      - db_root_pass

networks:
  frontend-zone:
    driver: bridge
  backend-zone:
    driver: bridge

volumes:
  db-storage:

configs:
  my-nginx-conf:
    file: ./nginx/my-nginx.conf

secrets:
  db_root_pass:
    file: ./secret/.db_root_pass.txt
  db_user_pass:
    file: ./secret/.db_user_pass.txt